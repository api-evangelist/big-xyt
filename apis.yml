name: big xyt
kind: company
description: big xyt AG (now branded simply xyt, with big-xyt.com redirecting to xyt.one)
  is an independent, majority employee-owned market data analytics firm headquartered
  in Frankfurt am Main, Germany. It sells tick-data-driven market intelligence covering
  equities, ETFs, listed derivatives, FX, and fixed income across 120+ venues, processing
  12bn+ messages per day with roughly ten years of history at nanosecond precision
  and market-by-order granularity. Products include the Liquidity Cockpit (market
  share and liquidity analytics), Transaction Cost Analysis against its SMART benchmark,
  pre-trade cost modeling, a Datashop of analysis-ready datasets and APIs, and an
  xyt AI natural-language query layer. Three API products are publicly named - the
  big xyt API, Liquidity Cockpit API, and TCA API - but their reference documentation
  sits behind a login at docs.big-xyt.com (HTTP 403 unauthenticated), and access is
  sales-gated via a book-a-demo motion with no self-serve signup, public pricing,
  or public OpenAPI.
