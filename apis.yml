  description: The core big xyt (xyt hub) API gives trading firms and exchanges programmatic
    access to normalised and raw tick data and analytics across 120+ venues without
    in-house tick data infrastructure. Publicly listed on the xythub.github.io landing
    page, but the reference documentation at docs.big-xyt.com is login-gated (HTTP
    403 unauthenticated), so endpoints and base URLs are not publicly documented.
    Legacy public docs (2018, github.com/xythub) described an HTTPS REST service using
    OAuth 2.0 password-grant bearer tokens with Protocol Buffers payloads and official
    Python, R, Java, and C# client libraries.
